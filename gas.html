<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gas Bill Calculator</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #1d2671, #c33764);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
    color: white;
}
.home-btn {
    display: inline-block;
    margin-bottom: 15px;
    padding: 8px 15px;
    border-radius: 8px;
    background: rgba(255,255,255,0.2);
    color: white;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.home-btn:hover {
    background: rgba(255,255,255,0.35);
}
.container {
    width: 100%;
    max-width: 360px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 15px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #ff7a18;
    color: white;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
}

#result {
    margin-top: 15px;
    font-size: 14px;
    text-align: left;
}

/* Mobile tweak */
@media (max-width: 400px) {
    h1 { font-size: 20px; }
}
</style>
</head>

<body>

<div class="container">
    <a href="./index.html" class="home-btn">🏠 Home</a>
    <h1>🔥 Gas Bill Calculator</h1>

    <input type="number" id="pre" placeholder="Previous Reading">
    <input type="number" id="current" placeholder="Current Reading">
    <input type="number" id="gcv" placeholder="GCV (eg: 1047)">
    <input type="number" id="pressure" placeholder="Gas Pressure (eg: 1.0416)">

    <button onclick="calculateBill()">Calculate Bill</button>

    <div id="result"></div>
</div>

<script>function calculateBill() {

    let pre = parseFloat(document.getElementById("pre").value);
    let current = parseFloat(document.getElementById("current").value);
    let gcv = parseFloat(document.getElementById("gcv").value);
    let pressure = parseFloat(document.getElementById("pressure").value);

    if (!pre || !current || !gcv || !pressure) {
        document.getElementById("result").innerHTML = "Fill all fields!";
        return;
    }

    // -------- Helper Functions (same as Python) --------

    function cal_slab_mmbtu(p_slab, hm3) {
        let c_slab = hm3 - p_slab;
        return [c_slab, p_slab];
    }

    function total_bill(bill, f_charges) {
        let rent = 41.33;
        let gst = (bill + rent + f_charges) * 0.18;

        return {
            rent: rent,
            gst: gst,
            total: bill + gst + rent + f_charges
        };
    }

    function slab(p_slab, c_slab, gcv, p_fee, c_fee) {
        let p_mmbtu = ((p_slab * gcv) / 281.7385);
        let c_mmbtu = ((c_slab * gcv) / 281.7385);
        let cost1 = p_mmbtu * p_fee;
        let cost2 = c_mmbtu * c_fee;
        return cost1 + cost2;
    }

    // -------- Core Calculations --------

    let units = current - pre;
    let c_unit = units * pressure;
    let hm3 = c_unit / 100;

    let bill = 0;
    let fixed = 1500;

    if (hm3 <= 0.25) {
        let mmbtu = (hm3 * gcv) / 281.7385;
        bill = mmbtu * 500;

        let res = total_bill(bill, 1500);

        showResult(hm3, bill, res.rent, 1500, res.gst, res.total);
    }

    else if (hm3 > 0.25 && hm3 <= 0.60) {
        let [c_slab, p_slab] = cal_slab_mmbtu(0.60, hm3);

        let cost1 = p_slab * 500;
        let cost2 = c_slab * 850;

        bill = cost1 + cost2;

        let res = total_bill(bill, 1500);

        showResult(hm3, bill, res.rent, 1500, res.gst, res.total);
    }

    else if (hm3 > 0.60 && hm3 <= 1) {
        let [c_slab, p_slab] = cal_slab_mmbtu(0.60, hm3);

        let cost1 = p_slab * 850;
        let cost2 = c_slab * 1250;

        bill = cost1 + cost2;

        let res = total_bill(bill, 1500);

        showResult(hm3, bill, res.rent, 1500, res.gst, res.total);
    }

    else if (hm3 > 1 && hm3 <= 1.5) {
        let [c_slab, p_slab] = cal_slab_mmbtu(1, hm3);

        let p_mmbtu = ((p_slab * gcv) / 281.7385);
        let c_mmbtu = ((c_slab * gcv) / 281.7385);

        let cost1 = p_mmbtu * 1250;
        let cost2 = c_mmbtu * 1450;

        bill = cost1 + cost2;

        let res = total_bill(bill, 1500);

        showResult(hm3, bill, res.rent, 1500, res.gst, res.total);
    }

    else if (hm3 > 1.5 && hm3 <= 2.0) {
        let [c_slab, p_slab] = cal_slab_mmbtu(1.5, hm3);

        let p_mmbtu = ((p_slab * gcv) / 281.7385);
        let c_mmbtu = ((c_slab * gcv) / 281.7385);

        let cost1 = p_mmbtu * 1450;
        let cost2 = c_mmbtu * 1900;

        bill = cost1 + cost2;

        let res = total_bill(bill, 3000);

        showResult(hm3, bill, res.rent, 3000, res.gst, res.total);
    }

    else if (hm3 > 2.0 && hm3 <= 3) {
        let [c_slab, p_slab] = cal_slab_mmbtu(2.0, hm3);

        let p_mmbtu = ((p_slab * gcv) / 281.7385);
        let c_mmbtu = ((c_slab * gcv) / 281.7385);

        let cost1 = p_mmbtu * 1900;
        let cost2 = c_mmbtu * 3300;

        bill = cost1 + cost2;

        let res = total_bill(bill, 3000);

        showResult(hm3, bill, res.rent, 3000, res.gst, res.total);
    }

    else if (hm3 > 3 && hm3 <= 4) {
        let [c_slab, p_slab] = cal_slab_mmbtu(3.0, hm3);

        bill = slab(p_slab, c_slab, gcv, 3300, 4500);

        let res = total_bill(bill, 3000);

        showResult(hm3, bill, res.rent, 3000, res.gst, res.total);
    }

    // -------- Display --------

    function showResult(hm3, bill, rent, fixed, gst, total) {
        document.getElementById("result").innerHTML = `
            📊 HM3: ${hm3.toFixed(6)}<br>
            🔥 Gas Price: ${bill.toFixed(2)}<br>
            🏠 Meter Rent: ${rent}<br>
            ⚙️ Fixed Charges: ${fixed}<br>
            💰 GST: ${gst.toFixed(2)}<br>
            <hr>
            ✅ Total Bill: ${total.toFixed(2)}
        `;
    }
}
</script>

</body>
</html>
