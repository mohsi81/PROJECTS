<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Projects</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    text-align: center;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

h1 {
    margin-top: 40px;
    font-size: 36px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 50px;
    flex-wrap: wrap;
    flex: 1;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
    width: 260px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
}

.card h2 {
    margin-bottom: 15px;
}

.card p {
    font-size: 14px;
    margin-bottom: 20px;
}

.card a {
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    background: linear-gradient(135deg, #ff7a18, #ff4e00);
    color: white;
    display: inline-block;
}

.card a:hover {
    background: #ff4e00;
}

/* Footer */
footer {
    background: rgba(0,0,0,0.3);
    padding: 15px;
    font-size: 14px;
    backdrop-filter: blur(5px);
}
</style>

</head>
<body>

<h1>🚀 My Projects</h1>

<div class="container">

    <!-- Age Calculator -->
    <div class="card">
        <h2>🎂 Age Calculator</h2>
        <p>Calculate your exact age in years, months, and days.</p>
        <a href="age.html">Open Project</a>
    </div>

    <!-- Gas Bill Calculator -->
    <div class="card">
        <h2>🔥 Gas Bill Calculator</h2>
        <p>Calculate your gas bill with slab system and GST.</p>
        <a href="gas.html">Open Project</a>
    </div>

</div>

<footer>
    © 2026 | Created by <b>Mohsin</b>
</footer>

</body>
</html>
