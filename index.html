<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    text-align: center;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

h1 {
    margin-top: 30px;
    font-size: 32px;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 40px 20px;
    flex-wrap: wrap;
    flex: 1;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
    width: 280px;
    max-width: 90%;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
}

.card h2 {
    margin-bottom: 15px;
    font-size: 22px;
}

.card p {
    font-size: 14px;
    margin-bottom: 20px;
}

/* Button */
.card a {
    text-decoration: none;
    padding: 12px 20px;
    border-radius: 8px;
    background: linear-gradient(135deg, #ff7a18, #ff4e00);
    color: white;
    display: inline-block;
    font-size: 15px;
}

.card a:hover {
    background: #ff4e00;
}

/* Footer */
footer {
    background: rgba(0,0,0,0.3);
    padding: 15px;
    font-size: 14px;
    backdrop-filter: blur(5px);
}

/* 📱 Mobile adjustments */
@media (max-width: 600px) {
    h1 {
        font-size: 26px;
    }

    .container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .card {
        width: 90%;
        padding: 20px;
    }

    .card h2 {
        font-size: 20px;
    }

    .card p {
        font-size: 13px;
    }
}
</style>

</head>
<body>

<h1> My Projects</h1>

<div class="container">

    <div class="card">
        <h2>🎂 Age Calculator</h2>
        <p>Calculate your exact age in years, months, and days.</p>
        <a href="./age.html">Open Project</a>
    </div>

    <div class="card">
        <h2>🔥 Gas Bill Calculator</h2>
        <p>Calculate your gas bill with slab system and GST.</p>
        <a href="./gas.html">Open Project</a>
    </div>

</div>

<footer>
    © 2026 | Created by <b>Mohsin</b>
</footer>

</body>
</html>
